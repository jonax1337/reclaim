name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & draft release (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & upload to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: 'Reclaim ${{ steps.tag.outputs.name }}'
          releaseBody: |
            ## Reclaim ${{ steps.tag.outputs.name }}

            Windows 11 tweaker — see [README](https://github.com/${{ github.repository }}#readme) for details.

            ### Installers
            - `Reclaim_<version>_x64-setup.exe` — NSIS installer (recommended)
            - `Reclaim_<version>_x64_en-US.msi` — MSI installer

            **Run as Administrator.** Take a system restore point before applying tweaks.

            <!-- Edit these notes before publishing. -->
          releaseDraft: true
          prerelease: false
